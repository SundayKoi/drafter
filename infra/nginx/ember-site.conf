# Unified site + drafter on emberesports.com.
# Drafter at /drafter (UI) and /draft/:id, /spectate/:id (the drafter SPA's own
# routes are kept so old links keep working). Main site is at /.
# API reverse-proxied at /api/*, WebSocket at /ws/*, uploads served statically.

server {
    listen 443 ssl http2;
    server_name emberesports.com www.emberesports.com;

    ssl_certificate     /etc/letsencrypt/live/emberesports.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emberesports.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Cap request body — backend also enforces 2MB per upload.
    client_max_body_size 3M;

    # Uploaded team logos — static files served by Nginx directly, not the backend.
    location /uploads/ {
        alias /uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Defence in depth: never execute anything in the uploads dir.
        location ~* \.(php|py|pl|sh|cgi)$ { deny all; }
    }

    # REST API
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (drafter rooms)
    location /ws/ {
        proxy_pass             http://backend:8000/ws/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_read_timeout     3600s;
    }

    # Stats static directory (existing)
    location /stats/ {
        alias /opt/ember-stats/;
        autoindex off;
    }

    # Frontend SPA — serves both the main site AND the drafter's routes.
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}

server {
    listen 80;
    server_name emberesports.com www.emberesports.com;
    return 301 https://emberesports.com$request_uri;
}
