version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ember_drafter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpass
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./scripts/init_db_user.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ember_drafter"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
